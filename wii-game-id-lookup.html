<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f1a; color: #e8e8f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 20px; }
  header { text-align: center; padding: 30px 0 24px; }
  header h1 { font-size: 1.8rem; font-weight: 700; color: #fff; }
  header h1 span { color: #7c6cf8; }
  header p { color: #888; font-size: 0.9rem; margin-top: 6px; }
  .search-box { display: flex; gap: 10px; max-width: 600px; margin: 0 auto 28px; }
  input { flex: 1; background: #1c1c2e; border: 1.5px solid #2e2e45; color: #e8e8f0; padding: 13px 16px; border-radius: 10px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #7c6cf8; }
  input::placeholder { color: #555; }
  #status { text-align: center; color: #777; font-size: 0.9rem; margin-bottom: 16px; min-height: 20px; }
  .results { display: flex; flex-direction: column; gap: 14px; max-width: 700px; margin: 0 auto; }
  .card { background: #1c1c2e; border: 1.5px solid #2a2a40; border-radius: 14px; padding: 18px 20px; transition: border-color 0.2s; }
  .card:hover { border-color: #7c6cf8; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .game-title { font-size: 1.05rem; font-weight: 700; color: #fff; line-height: 1.3; }
  .game-meta { font-size: 0.78rem; color: #666; margin-top: 3px; }
  .game-id-badge { background: #2a2040; color: #b09fff; font-family: monospace; font-size: 0.95rem; font-weight: 700; padding: 5px 12px; border-radius: 8px; white-space: nowrap; border: 1px solid #3d2e6e; }
  .label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #555; margin-bottom: 5px; }
  .path-box { background: #111120; border: 1px solid #252535; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .path-text { font-family: monospace; font-size: 0.82rem; color: #a0e0a0; word-break: break-all; line-height: 1.5; }
  .copy-btn { background: #252535; color: #aaa; border: none; padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: background 0.15s, color 0.15s; flex-shrink: 0; }
  .copy-btn:hover { background: #7c6cf8; color: #fff; }
  .copy-btn.copied { background: #2a5c2a; color: #7fcf7f; }
  .no-results { text-align: center; color: #555; padding: 40px 0; font-size: 0.95rem; }
  .no-results a { color: #7c6cf8; text-decoration: none; }
  .no-results a:hover { text-decoration: underline; }
  .db-note { text-align: center; font-size: 0.75rem; color: #444; margin-top: 30px; padding-bottom: 20px; }
  .db-note a { color: #555; }
</style>

function doSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  if (!query) { results.innerHTML = ''; status.textContent = ''; return; }

  const seen = new Set();
  const matches = GAMES.filter(g => {
    if (!g[0].toLowerCase().includes(query)) return false;
    if (seen.has(g[1])) return false;
    seen.add(g[1]);
    return true;
  });

  if (matches.length === 0) {
    status.textContent = '';
    const enc = encodeURIComponent(query);
    results.innerHTML = `<div class="no-results">No results for "<strong>${query}</strong>".<br><br>Try searching on <a href="https://www.gametdb.com/Wii/List?search=${enc}" target="_blank">GameTDB directly &nearr;</a></div>`;
  } else {
    status.textContent = `${matches.length} result${matches.length !== 1 ? 's' : ''} found`;
    results.innerHTML = matches.map(buildCard).join('');
  }
}

function buildCard([name, id, region]) {
  const safe = name.replace(/[\/\\:*?"<>|]/g, '');
  const folder = `${safe} [${id}]`;
  const folderPath = `wbfs/${folder}/`;
  const filePath = `wbfs/${folder}/${folder}.wbfs`;
  return `<div class="card">
    <div class="card-top">
      <div><div class="game-title">${name}</div><div class="game-meta">Region: ${region}</div></div>
      <div class="game-id-badge">${id}</div>
    </div>
    <div class="label">Folder</div>
    <div class="path-box"><span class="path-text">${folderPath}</span><button class="copy-btn" onclick="cp(this,'${folderPath.replace(/'/g,"\\'")}')">Copy</button></div>
    <div class="label">File Path</div>
    <div class="path-box"><span class="path-text">${filePath}</span><button class="copy-btn" onclick="cp(this,'${filePath.replace(/'/g,"\\'")}')">Copy</button></div>
  </div>`;
}

function cp(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

document.getElementById('searchInput').addEventListener('input', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
